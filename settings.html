<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — CloudDrive</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <button class="btn-icon hamburger" id="hamburger"><span class="material-symbols-outlined">menu</span></button>
      <div class="topbar-right">
        <button class="btn-icon" data-action="toggle-theme"><span class="material-symbols-outlined" data-theme-icon>dark_mode</span></button>
        <div class="dropdown">
          <button class="user-avatar-btn" id="user-avatar-btn">
            <div class="avatar" id="topbar-avatar">U</div>
          </button>
          <div class="dropdown-menu hidden" id="user-menu">
            <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
              <div id="user-display-name" style="font-weight:600;font-size:14px"></div>
              <div id="user-display-email" style="font-size:12px;color:var(--text-secondary)"></div>
            </div>
            <button class="dropdown-item danger" data-action="logout"><span class="material-symbols-outlined">logout</span>Sign out</button>
          </div>
        </div>
      </div>
    </header>

    <div class="content-area" style="padding:24px;max-width:680px;margin:0 auto">
      <h1 style="font-size:24px;font-weight:700;margin-bottom:24px">Settings</h1>

      <!-- Appearance -->
      <div style="background:var(--bg-card);border-radius:var(--r-lg);padding:28px;box-shadow:var(--shadow-sm);margin-bottom:20px">
        <h2 style="font-size:16px;font-weight:600;margin-bottom:20px">Appearance</h2>
        <div class="form-group">
          <label class="form-label">Theme</label>
          <select class="form-control" id="theme-select" style="max-width:200px">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Language</label>
          <select class="form-control" id="lang-select" style="max-width:200px">
            <option value="en">English</option>
            <option value="ta">Tamil</option>
          </select>
        </div>
      </div>

      <!-- Notifications -->
      <div style="background:var(--bg-card);border-radius:var(--r-lg);padding:28px;box-shadow:var(--shadow-sm);margin-bottom:20px">
        <h2 style="font-size:16px;font-weight:600;margin-bottom:20px">Notifications</h2>
        <div style="display:flex;flex-direction:column;gap:16px">
          <label style="display:flex;align-items:center;justify-content:space-between;cursor:pointer">
            <div>
              <div style="font-size:14px;font-weight:500">Upload notifications</div>
              <div style="font-size:12px;color:var(--text-secondary)">Get notified when uploads complete</div>
            </div>
            <input type="checkbox" id="notif-uploads" checked style="accent-color:var(--primary);width:18px;height:18px">
          </label>
          <label style="display:flex;align-items:center;justify-content:space-between;cursor:pointer">
            <div>
              <div style="font-size:14px;font-weight:500">Share notifications</div>
              <div style="font-size:12px;color:var(--text-secondary)">Get notified when files are shared with you</div>
            </div>
            <input type="checkbox" id="notif-shares" checked style="accent-color:var(--primary);width:18px;height:18px">
          </label>
        </div>
      </div>

      <!-- Keyboard Shortcuts -->
      <div style="background:var(--bg-card);border-radius:var(--r-lg);padding:28px;box-shadow:var(--shadow-sm)">
        <h2 style="font-size:16px;font-weight:600;margin-bottom:16px">Keyboard Shortcuts</h2>
        <div id="keyboard-shortcuts"></div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>fetch('components/sidebar.html').then(r=>r.text()).then(h=>{document.getElementById('sidebar-container').innerHTML=h})</script>
<script type="module" src="js/settings.js"></script>
</body>
</html>
