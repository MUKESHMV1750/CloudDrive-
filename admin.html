<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — CloudDrive</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/card.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>

  <div class="main-content">
    <!-- Topbar -->
    <header class="topbar">
      <button class="btn-icon hamburger" id="hamburger"><span class="material-symbols-outlined">menu</span></button>
      <div class="topbar-search">
        <div class="search-box">
          <span class="material-symbols-outlined">search</span>
          <input type="text" id="global-search" placeholder="Search users or files…">
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn-icon" data-action="toggle-theme"><span class="material-symbols-outlined" data-theme-icon>dark_mode</span></button>
        <div class="dropdown">
          <button class="user-avatar-btn" id="user-avatar-btn">
            <div class="avatar" id="topbar-avatar">A</div>
            <span class="material-symbols-outlined" style="font-size:18px;color:var(--text-secondary)">expand_more</span>
          </button>
          <div class="dropdown-menu hidden" id="user-menu" style="min-width:200px">
            <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
              <div id="user-display-name" style="font-weight:600;font-size:14px"></div>
              <div id="user-display-email" style="font-size:12px;color:var(--text-secondary)"></div>
            </div>
            <a class="dropdown-item" href="profile.html"><span class="material-symbols-outlined">account_circle</span>Profile</a>
            <hr class="dropdown-divider">
            <button class="dropdown-item danger" data-action="logout"><span class="material-symbols-outlined">logout</span>Sign out</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Tab Navigation -->
    <div style="display:flex;gap:0;padding:0 24px;border-bottom:1px solid var(--border);background:var(--bg-main)">
      <button class="admin-tab active" data-tab="overview" style="padding:14px 20px;font-size:14px;font-weight:500;border:none;background:none;cursor:pointer;border-bottom:2px solid var(--primary);color:var(--primary)">Overview</button>
      <button class="admin-tab" data-tab="users" id="tab-users" style="padding:14px 20px;font-size:14px;font-weight:500;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-secondary)">Users</button>
      <button class="admin-tab" data-tab="files" style="padding:14px 20px;font-size:14px;font-weight:500;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-secondary)">Files</button>
      <button class="admin-tab" data-tab="logs" id="tab-logs" style="padding:14px 20px;font-size:14px;font-weight:500;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-secondary)">Activity Logs</button>
    </div>

    <div class="content-area" style="padding:24px">

      <!-- OVERVIEW TAB -->
      <div id="tab-overview" class="admin-panel">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue"><span class="material-symbols-outlined">people</span></div>
            <div class="stat-info">
              <div class="stat-value" id="stat-users">—</div>
              <div class="stat-label">Total Users</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green"><span class="material-symbols-outlined">description</span></div>
            <div class="stat-info">
              <div class="stat-value" id="stat-files">—</div>
              <div class="stat-label">Total Files</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon yellow"><span class="material-symbols-outlined">storage</span></div>
            <div class="stat-info">
              <div class="stat-value" id="stat-storage">—</div>
              <div class="stat-label">Storage Used</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon purple"><span class="material-symbols-outlined">upload</span></div>
            <div class="stat-info">
              <div class="stat-value" id="stat-today">—</div>
              <div class="stat-label">Today's Uploads</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon red"><span class="material-symbols-outlined">delete</span></div>
            <div class="stat-info">
              <div class="stat-value" id="stat-deleted">—</div>
              <div class="stat-label">Deleted Files</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon blue"><span class="material-symbols-outlined">share</span></div>
            <div class="stat-info">
              <div class="stat-value" id="stat-shared">—</div>
              <div class="stat-label">Shared Files</div>
            </div>
          </div>
        </div>

        <!-- Recent Logs Preview -->
        <div style="background:var(--bg-card);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-sm)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <h2 style="font-size:16px;font-weight:600">Recent Activity</h2>
            <button class="btn btn-ghost btn-sm" data-tab="logs">View all →</button>
          </div>
          <div id="recent-logs-preview"></div>
        </div>
      </div>

      <!-- USERS TAB -->
      <div id="tab-users-panel" class="admin-panel hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <h2 style="font-size:18px;font-weight:600">Manage Users</h2>
          <button class="btn btn-primary" id="add-user-btn">
            <span class="material-symbols-outlined">person_add</span>Add User
          </button>
        </div>
        <div style="background:var(--bg-card);border-radius:var(--r-lg);padding:0;box-shadow:var(--shadow-sm);overflow:hidden;overflow-x:auto">
          <div id="users-table-container">
            <div style="padding:24px;text-align:center"><div class="loading-spinner" style="margin:auto"></div></div>
          </div>
        </div>
      </div>

      <!-- FILES TAB -->
      <div id="tab-files-panel" class="admin-panel hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <h2 style="font-size:18px;font-weight:600">All Files</h2>
        </div>
        <div class="view-toggle" style="margin-bottom:16px">
          <button class="view-btn active" id="view-grid"><span class="material-symbols-outlined">grid_view</span></button>
          <button class="view-btn" id="view-list"><span class="material-symbols-outlined">list</span></button>
        </div>
        <div id="admin-files-area"></div>
      </div>

      <!-- LOGS TAB -->
      <div id="tab-logs-panel" class="admin-panel hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
          <h2 style="font-size:18px;font-weight:600">Activity Logs</h2>
        </div>
        <div style="background:var(--bg-card);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-sm)">
          <div id="activity-logs-container">
            <div style="text-align:center;padding:24px"><div class="loading-spinner" style="margin:auto"></div></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>fetch('components/sidebar.html').then(r=>r.text()).then(h=>{document.getElementById('sidebar-container').innerHTML=h})</script>
<script src="js/admin.bundle.js"></script>
</body>
</html>
