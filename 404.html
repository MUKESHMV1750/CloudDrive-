<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | CloudDrive</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-main)">
  <div class="empty-state" style="gap:20px">
    <div class="empty-icon" style="width:100px;height:100px;font-size:56px">
      <span class="material-symbols-outlined" style="font-size:56px">search_off</span>
    </div>
    <h1 style="font-size:80px;font-weight:700;color:var(--primary);line-height:1">404</h1>
    <h2 style="font-size:24px;font-weight:600">Page not found</h2>
    <p style="color:var(--text-secondary);max-width:360px">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <a href="index.html" class="btn btn-primary btn-lg">
      <span class="material-symbols-outlined">home</span>Back to CloudDrive
    </a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/404.bundle.js"></script>
</body>
</html>
