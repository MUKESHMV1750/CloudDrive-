<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — CloudDrive</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <header class="topbar">
      <button class="btn-icon hamburger" id="hamburger"><span class="material-symbols-outlined">menu</span></button>
      <div class="topbar-right">
        <button class="btn-icon" data-action="toggle-theme"><span class="material-symbols-outlined" data-theme-icon>dark_mode</span></button>
        <div class="dropdown">
          <button class="user-avatar-btn" id="user-avatar-btn">
            <div class="avatar" id="topbar-avatar">U</div>
          </button>
          <div class="dropdown-menu hidden" id="user-menu">
            <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
              <div id="user-display-name" style="font-weight:600;font-size:14px"></div>
              <div id="user-display-email" style="font-size:12px;color:var(--text-secondary)"></div>
            </div>
            <button class="dropdown-item danger" data-action="logout"><span class="material-symbols-outlined">logout</span>Sign out</button>
          </div>
        </div>
      </div>
    </header>

    <div class="content-area" style="padding:24px;max-width:720px;margin:0 auto">
      <h1 style="font-size:24px;font-weight:700;margin-bottom:24px">Profile Settings</h1>

      <!-- Avatar & Basic Info -->
      <div style="background:var(--bg-card);border-radius:var(--r-lg);padding:28px;box-shadow:var(--shadow-sm);margin-bottom:20px">
        <h2 style="font-size:16px;font-weight:600;margin-bottom:20px">Personal Information</h2>
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px">
          <div id="profile-avatar" style="position:relative;cursor:pointer">
            <div class="avatar avatar-xl">U</div>
          </div>
          <div>
            <button class="btn btn-outlined btn-sm" id="change-avatar-btn">
              <span class="material-symbols-outlined" style="font-size:16px">photo_camera</span>Change Photo
            </button>
            <div style="font-size:12px;color:var(--text-secondary);margin-top:6px">JPG, PNG up to 5 MB</div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input class="form-control" id="profile-name" type="text" placeholder="Your name">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input class="form-control" id="profile-email" type="email" disabled style="opacity:.6">
        </div>
        <div style="display:flex;gap:16px;align-items:center">
          <div>
            <div style="font-size:12px;color:var(--text-secondary)">Role</div>
            <span id="profile-role" class="badge badge-primary" style="margin-top:4px">user</span>
          </div>
          <div>
            <div style="font-size:12px;color:var(--text-secondary)" id="profile-joined">—</div>
          </div>
        </div>
        <div style="margin-top:20px;display:flex;justify-content:flex-end">
          <button class="btn btn-primary" id="save-profile-btn">
            <span class="material-symbols-outlined">save</span>Save Changes
          </button>
        </div>
      </div>

      <!-- Storage -->
      <div style="background:var(--bg-card);border-radius:var(--r-lg);padding:28px;box-shadow:var(--shadow-sm);margin-bottom:20px">
        <h2 style="font-size:16px;font-weight:600;margin-bottom:16px">Storage</h2>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:14px;font-weight:500"><span id="storage-used-val">—</span> used</span>
          <span style="font-size:14px;color:var(--text-secondary)">of <span id="storage-limit-val">15 GB</span></span>
        </div>
        <div class="progress" style="height:8px;margin-bottom:8px">
          <div class="progress-bar" id="storage-fill-profile" style="width:0%"></div>
        </div>
        <div style="font-size:12px;color:var(--text-secondary)"><span id="storage-pct">0%</span> of your storage used</div>
      </div>

      <!-- Change Password -->
      <div style="background:var(--bg-card);border-radius:var(--r-lg);padding:28px;box-shadow:var(--shadow-sm)">
        <h2 style="font-size:16px;font-weight:600;margin-bottom:20px">Change Password</h2>
        <form id="password-form" novalidate>
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input class="form-control" id="new-pass" type="password" placeholder="Min. 8 characters">
          </div>
          <div class="form-group" style="margin-bottom:20px">
            <label class="form-label">Confirm Password</label>
            <input class="form-control" id="confirm-pass" type="password" placeholder="Confirm new password">
          </div>
          <div style="display:flex;justify-content:flex-end">
            <button type="submit" class="btn btn-primary">
              <span class="material-symbols-outlined">lock</span>Update Password
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>fetch('components/sidebar.html').then(r=>r.text()).then(h=>{document.getElementById('sidebar-container').innerHTML=h})</script>
<script src="js/profile.bundle.js"></script>
</body>
</html>
