<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Drive — CloudDrive</title>
  <meta name="description" content="CloudDrive — manage your files and folders online.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/card.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
</head>
<body>
<div class="app-layout">

  <!-- Sidebar (injected) -->
  <div id="sidebar-container"></div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-icon hamburger" id="hamburger">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>

      <!-- Search -->
      <div class="topbar-search">
        <div class="search-box">
          <span class="material-symbols-outlined">search</span>
          <input type="text" id="global-search" placeholder="Search in Drive (Press / to focus)" autocomplete="off">
          <button class="btn-icon hidden" id="search-clear" style="width:28px;height:28px">
            <span class="material-symbols-outlined" style="font-size:18px">close</span>
          </button>
        </div>
      </div>

      <!-- Right Actions -->
      <div class="topbar-right">
        <button class="btn-icon" data-action="toggle-theme" data-tooltip="Toggle theme">
          <span class="material-symbols-outlined" data-theme-icon>dark_mode</span>
        </button>
        <button class="btn-icon" id="upload-trigger-topbar" data-tooltip="Upload file (Ctrl+U)">
          <span class="material-symbols-outlined">upload</span>
        </button>
        <!-- User Menu -->
        <div class="dropdown">
          <button class="user-avatar-btn" id="user-avatar-btn">
            <div class="avatar" id="topbar-avatar">U</div>
            <span class="material-symbols-outlined" style="font-size:18px;color:var(--text-secondary)">expand_more</span>
          </button>
          <div class="dropdown-menu hidden" id="user-menu" style="min-width:220px">
            <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
              <div id="user-display-name" style="font-weight:600;font-size:14px"></div>
              <div id="user-display-email" style="font-size:12px;color:var(--text-secondary)"></div>
            </div>
            <a class="dropdown-item" href="profile.html">
              <span class="material-symbols-outlined">account_circle</span>Profile
            </a>
            <a class="dropdown-item" href="settings.html">
              <span class="material-symbols-outlined">settings</span>Settings
            </a>
            <button class="dropdown-item" data-action="toggle-theme">
              <span class="material-symbols-outlined" data-theme-icon>dark_mode</span>Toggle Dark Mode
            </button>
            <hr class="dropdown-divider">
            <button class="dropdown-item danger" data-action="logout">
              <span class="material-symbols-outlined">logout</span>Sign out
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Header -->
    <div class="page-header">
      <h1 class="page-title">My Drive</h1>
      <div class="page-actions">
        <button class="btn btn-outlined btn-sm" id="new-folder-btn">
          <span class="material-symbols-outlined">create_new_folder</span>New Folder
        </button>
        <button class="btn btn-primary btn-sm" id="upload-trigger">
          <span class="material-symbols-outlined">upload</span>Upload
        </button>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-left">
        <!-- Filter Chips -->
        <button class="chip filter-chip" data-category="">All files</button>
        <button class="chip filter-chip" data-category="image">
          <span class="material-symbols-outlined" style="font-size:14px">image</span>Images
        </button>
        <button class="chip filter-chip" data-category="video">
          <span class="material-symbols-outlined" style="font-size:14px">movie</span>Videos
        </button>
        <button class="chip filter-chip" data-category="doc">
          <span class="material-symbols-outlined" style="font-size:14px">article</span>Documents
        </button>
        <button class="chip filter-chip" data-category="archive">
          <span class="material-symbols-outlined" style="font-size:14px">folder_zip</span>Archives
        </button>
        <button class="chip filter-chip" data-category="code">
          <span class="material-symbols-outlined" style="font-size:14px">code</span>Code
        </button>
      </div>
      <div class="toolbar-right">
        <select class="form-control" id="sort-select" style="height:34px;font-size:13px;width:140px">
          <option value="date_desc">Newest first</option>
          <option value="date_asc">Oldest first</option>
          <option value="name_asc">Name A→Z</option>
          <option value="name_desc">Name Z→A</option>
          <option value="size_desc">Largest</option>
          <option value="size_asc">Smallest</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn active" id="view-grid" title="Grid view">
            <span class="material-symbols-outlined">grid_view</span>
          </button>
          <button class="view-btn" id="view-list" title="List view">
            <span class="material-symbols-outlined">list</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Drop Zone -->
    <div class="drop-zone" id="drop-zone">
      <span class="material-symbols-outlined drop-zone-icon">cloud_upload</span>
      <h4>Drop files here to upload</h4>
      <p>Or click to browse your files</p>
    </div>

    <!-- Content Area -->
    <div class="content-area" id="content-area">
      <!-- Files and folders rendered by dashboard.js -->
    </div>

  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- Load sidebar -->
<script>
  // Sidebar loader — works on both file:// and http://
  (function() {
    function injectSidebar(html) {
      document.getElementById('sidebar-container').innerHTML = html;
    }
    try {
      fetch('components/sidebar.html')
        .then(function(r) { return r.text(); })
        .then(injectSidebar)
        .catch(function() { injectSidebar(''); });
    } catch(e) { injectSidebar(''); }
  })();
</script>
<script src="js/dashboard.bundle.js"></script>
</body>
</html>
